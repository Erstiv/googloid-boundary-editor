# Nginx config for Googloid Boundary Editor
# Install: copy to /etc/nginx/sites-available/googloid
# Then: ln -sf /etc/nginx/sites-available/googloid /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx
# Then: certbot --nginx -d googloid.com -d www.googloid.com

server {
    listen 80;
    server_name googloid.com www.googloid.com;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
